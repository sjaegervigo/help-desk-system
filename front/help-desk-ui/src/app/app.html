<div class="container mt-5">
  <div class = "card shadow">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">Help Desk - Panel de Control</h3>
    </div>

    <div class="card-body">
      <table class="table table-hover">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Titulo</th>
            <th>Descripcion</th>
            <th>Prioridad</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of tickets()">
            <td>{{t.id}}</td>
            <td><strong>{{t.titulo}}</strong></td>
            <td>{{t.descripcion}}</td>
            <td>
              <span class="badge"
                [ngClass]="{'bg-danger' : t.prioridad ==='HIGH', 'bg-warning': t.prioridad === 'MEDIUM', 'bg-success': t.prioridad === 'LOW'}">
                {{t.prioridad}}
              </span>
            </td>
            <td>
              <span class="badge bg-info text-dark">{{t.estado}}</span>
            </td>
          </tr>
        </tbody>
      </table>      
    </div>   

    <div *ngIf="tickets().length === 0" class="text-center">
        <p class="text-muted">No hay tickets para mostrar. Revisa que el backend esté en linea</p>
      </div>
     
  </div>
</div>
